<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>幸运大转盘抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:sans-serif}
.wrap{text-align:center;background:rgba(255,255,255,0.1);padding:40px;border-radius:20px}
h1{color:#fff;margin-bottom:20px}
.box{width:300px;height:300px;background:#fff;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;margin:20px auto}
.btn{background:#ff4757;color:#fff;border:none;padding:20px 50px;font-size:20px;border-radius:50px;cursor:pointer;margin-top:20px}
.btn:disabled{background:#ccc;cursor:not-allowed}
.result{color:#333;font-size:18px;margin:20px 0;font-weight:bold}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:100}
.modal.show{display:flex}
.content{background:#fff;padding:40px;border-radius:20px;text-align:center;max-width:90%;width:400px}
.content h2{color:#764ba2;margin-bottom:15px}
.qr{width:200px;height:200px;margin:20px auto}
.qr img{width:100%;height:100%;object-fit:contain}
.tip{color:#ff6b6b;font-size:14px;margin-top:10px}
.close{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:12px 40px;border-radius:25px;font-size:16px;cursor:pointer;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
<h1>🎰 幸运大转盘 🎰</h1>
<div class="box">
<div class="result" id="result">点击下方按钮抽奖</div>
<button class="btn" id="btn" onclick="draw()">抽奖</button>
</div>
</div>

<div class="modal" id="modal">
<div class="content">
<h2>🎉 恭喜中奖 🎉</h2>
<div class="result" id="prize"></div>
<div class="qr"><img src="https://740879648-png.github.io/Aubreylt/qrcode.jpg" alt="二维码"></div>
<p>扫描上方二维码添加好友领奖</p>
<p class="tip">请在24小时内添加，逾期作废</p>
<button class="close" onclick="closeModal()">我知道了</button>
</div>
</div>

<script>
var drawn = localStorage.getItem('drawn') === 'yes';
var btn = document.getElementById('btn');
var result = document.getElementById('result');
var modal = document.getElementById('modal');
var prize = document.getElementById('prize');

if(drawn) {
btn.disabled = true;
btn.textContent = '已抽奖';
result.textContent = '一等奖 - AI工具（价值2690元）';
}

function draw() {
if(drawn) return;
drawn = true;
localStorage.setItem('drawn', 'yes');
btn.disabled = true;
btn.textContent = '抽奖中...';
result.textContent = '';

setTimeout(function() {
result.textContent = '一等奖 - AI工具！';
prize.textContent = '一等奖 - AI工具（价值2690元）';
modal.classList.add('show');
btn.textContent = '已抽奖';
}, 2000);
}

function closeModal() {
modal.classList.remove('show');
}
</script>
</body>
</html>
