<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>&#24184;&#36816;&#22823;&#25277;&#31070;</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Microsoft YaHei',sans-serif}
.wrap{text-align:center;padding:20px}
h1{color:#ffd700;margin-bottom:30px;font-size:32px;text-shadow:0 0 20px rgba(255,215,0,0.5)}
.slot-machine{position:relative;width:340px;height:260px;background:linear-gradient(180deg,#2d2d44,#1a1a2e);border-radius:20px;padding:15px;margin:0 auto;box-shadow:0 15px 50px rgba(0,0,0,0.5),inset 0 2px 0 rgba(255,255,255,0.1);border:4px solid #ffd700}
.window{width:100%;height:170px;background:#000;border-radius:10px;overflow:hidden;box-shadow:inset 0 0 25px rgba(255,215,0,0.15);position:relative}
.line{position:absolute;top:50%;left:5%;width:90%;height:3px;background:rgba(255,215,0,0.7);box-shadow:0 0 12px rgba(255,215,0,0.9);z-index:10;transform:translateY(-50%)}
.reels{display:flex;gap:8px;justify-content:center;padding:25px 0;position:relative;height:120px}
.reel{width:90px;height:120px;position:relative;overflow:hidden;background:#111;border-radius:8px;border:2px solid #ffd700}
.reel-strip{position:absolute;width:100%;top:0;left:0;transition:transform 3s cubic-bezier(0.2,0.8,0.3,1)}
.reel-item{width:100%;height:120px;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,#222,#111);flex-shrink:0}
.reel-item img{width:80px;height:80px;object-fit:contain;display:block}
.handle{position:absolute;right:-22px;top:50%;width:25px;height:100px;background:linear-gradient(90deg,#c0c0c0,#888);border-radius:0 12px 12px 0;transform:translateY(-50%);cursor:pointer;transition:transform 0.2s;z-index:5}
.handle::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;background:#ffd700;border-radius:50%;box-shadow:0 0 8px rgba(255,215,0,0.5)}
.handle.pull{transform:translateY(-25%)}
.btn{width:200px;padding:15px;margin:25px auto 0;background:linear-gradient(180deg,#ffd700,#ff8c00);border:none;border-radius:50px;font-size:20px;font-weight:bold;color:#1a1a2e;cursor:pointer;box-shadow:0 6px 20px rgba(255,140,0,0.4);transition:all 0.2s}
.btn:hover{transform:scale(1.05);box-shadow:0 8px 25px rgba(255,140,0,0.5)}
.btn:disabled{background:#555;color:#999;cursor:not-allowed;transform:none}
.tip{color:#ffd700;margin-top:15px;font-size:14px;opacity:0.8}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:100}
.modal.show{display:flex}
.content{background:#fff;padding:40px 30px;border-radius:25px;text-align:center;max-width:90%;width:420px;animation:slideUp 0.5s cubic-bezier(0.17,0.67,0.12,0.99)}
.content h2{color:#764ba2;margin-bottom:20px;font-size:26px}
.prize-img{width:180px;height:180px;margin:15px auto;border-radius:15px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.15)}
.prize-img img{width:100%;height:100%;object-fit:contain}
.prize-name{font-size:18px;font-weight:bold;color:#333;margin:15px 0}
.qr-box{width:200px;height:200px;margin:20px auto;background:#f5f5f5;border-radius:15px;padding:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.qr-box img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.content p{color:#666;font-size:15px;margin:12px 0;line-height:1.6}
.tip-text{color:#ff4757;font-size:13px;margin-top:10px}
.next-btn{background:linear-gradient(180deg,#ffd700,#ff8c00);color:#1a1a2e;border:none;padding:15px 50px;border-radius:25px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:20px;transition:transform 0.2s}
.next-btn:hover{transform:scale(1.05)}
.close{background:linear-gradient(180deg,#764ba2,#667eea);color:#fff;border:none;padding:12px 40px;border-radius:25px;font-size:16px;cursor:pointer;margin-top:15px;transition:transform 0.2s}
.close:hover{transform:scale(1.05)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,215,0,0.3)}50%{box-shadow:0 0 30px rgba(255,215,0,0.8)}}
.slot-machine{animation:glow 2s infinite}
@media(max-width:400px){
.slot-machine{width:300px;height:230px}
.reel{width:75px;height:100px}
.reel-item{width:75px;height:100px}
.reel-item img{width:65px;height:65px}
.btn{width:160px;font-size:16px}
.content{padding:30px 20px}
}
</style>
</head>
<body>
<div class="wrap">
<h1>&#24184;&#36816;&#22823;&#25277;&#31070;</h1>
<div class="slot-machine">
<div class="window">
<div class="line"></div>
<div class="reels">
<div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
<div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
<div class="reel" id="reel3"><div class="reel-strip" id="strip3"></div></div>
</div>
</div>
<div class="handle" id="handle" onclick="spin()"></div>
</div>
<button class="btn" id="btn" onclick="spin()">&#25277;&#31070;</button>
<div class="tip">&#27599;&#20154;&#38480;&#25277;1&#27425; - 100%&#20013;&#31070;</div>
</div>

<div class="modal" id="modal1">
<div class="content">
<h2>&#24688;&#21916;&#20013;&#31070;</h2>
<div class="prize-img" id="prizeImg"></div>
<div class="prize-name" id="prizeName"></div>
<p>&#35831;&#28155;&#21160;&#23454;&#25945;&#24072;&#39044;&#21462;&#21697;</p>
<button class="next-btn" onclick="showQRCode()">&#28155;&#21160;&#23454;&#25945;&#24072;</button>
</div>
</div>

<div class="modal" id="modal2">
<div class="content">
<h2>&#25195;&#30721;&#28155;&#21160;&#23454;&#25945;&#24072;</h2>
<div class="qr-box">
<img src="https://740879648-png.github.io/Aubreylt/qrcode.jpg" alt="QR">
</div>
<p>&#38271;&#25353;&#20445;&#23384;&#20108;&#32500;&#30721;&#65292;&#25195;&#30721;&#28155;&#21160;&#23454;&#25945;&#24072;</p>
<p class="tip-text">&#35831;&#22312;24&#23567;&#26102;&#20869;&#28155;&#21160;&#65292;&#36807;&#26399;&#20316;&#24223;</p>
<button class="close" onclick="closeAll()">&#25105;&#30693;&#36947;&#20102;</button>
</div>
</div>

<script>
var prizes = [
{img:'prizes/free-order.jpg',name:'&#29305;&#31561;&#31070; - &#20813;&#21333;',prob:0},
{img:'prizes/ai-tool.jpg',name:'&#19968;&#31561;&#31070; - AI&#24037;&#20855;&#21253;&#65288;&#20215;&#20540;2690&#20803;&#65289',prob:1},
{img:'prizes/xiaomi-phone.jpg',name:'20108&#31561;&#31070; - &#23567;&#31859;&#25163;&#26426;&#65288;&#20215;&#20540;1199&#20803;&#65289',prob:0},
{img:'prizes/steam-pot.jpg',name:'19977&#31561;&#31070; - &#34218;&#27748;&#38149;&#65288;&#20215;&#20540;398&#20803;&#65289',prob:0},
{img:'prizes/ai-tool.jpg',name:'&#24800;&#36816;&#31070; - 50&#20803;&#32418;&#21253;',prob:0},
{img:'prizes/ai-tool.jpg',name:'&#21442;&#19982;&#31070; - 20&#20803;&#32418;&#21253;',prob:0},
{img:'prizes/ai-tool.jpg',name:'&#21442;&#19982;&#31070; - 10&#20803;&#32418;&#21253;',prob:0},
{img:'prizes/ai-tool.jpg',name:'&#35874;&#35874;&#21442;&#19982;',prob:0}
];

var baseUrl = 'https://740879648-png.github.io/Aubreylt/';
var drawn = localStorage.getItem('lottery_v2') === 'yes';
var spinning = false;
var prizeCount = prizes.length;

function init() {
var btn = document.getElementById('btn');
if (drawn) {
btn.disabled = true;
btn.textContent = '&#24050;&#25277;&#31070;';
document.querySelector('.tip').textContent = '&#24744;&#24050;&#21442;&#19982;&#36807;&#25277;&#31070;';
}
prizes.forEach(function(p, i) {
['strip1','strip2','strip3'].forEach(function(id) {
var item = document.createElement('div');
item.className = 'reel-item';
item.innerHTML = '<img src="' + baseUrl + p.img + '" onerror="this.style.display=\'none\'">';
item.dataset.index = i;
document.getElementById(id).appendChild(item);
});
});
if (drawn) showResult(1);
}

function spin() {
if (spinning) return;
if (drawn) {alert('\u60A8\u5DF2\u53C2\u4E0E\u8FC7\u62BD\u5956\uFF01');return;}
spinning = true;
var btn = document.getElementById('btn');
var handle = document.getElementById('handle');
btn.disabled = true;
btn.textContent = '\u62BD\u5956\u4E2D...';
handle.classList.add('pull');
setTimeout(function(){handle.classList.remove('pull')},300);

var rand = Math.random();
var cum = 0;
var idx = prizeCount - 1;
for (var i = 0; i < prizeCount; i++) {
cum += prizes[i].prob;
if (rand < cum) {idx = i; break;}
}

var itemHeight = 120;
var scrollDuration = 3500;
var reels = ['strip1','strip2','strip3'];

reels.forEach(function(stripId, k) {
var strip = document.getElementById(stripId);
var totalHeight = prizeCount * itemHeight;
var extraSpins = 5 + k * 2;
var targetY = -(idx * itemHeight + extraSpins * totalHeight);

strip.style.transition = 'none';
strip.style.transform = 'translateY(0)';

setTimeout(function() {
var duration = scrollDuration + k * 500;
strip.style.transition = 'transform ' + duration + 'ms cubic-bezier(0.15, 0.85, 0.35, 1)';
strip.style.transform = 'translateY(' + targetY + 'px)';
}, 50);
});

setTimeout(function() {
drawn = true;
localStorage.setItem('lottery_v2', 'yes');
btn.textContent = '\u5DF2\u62BD\u5956';
document.querySelector('.tip').textContent = '\u60A8\u5DF2\u53C2\u4E0E\u8FC7\u62BD\u5956';
showResult(idx);
spinning = false;
}, scrollDuration + 1500);
}

function showResult(idx) {
var p = prizes[idx];
document.getElementById('prizeImg').innerHTML = '<img src="' + baseUrl + p.img + '" style="width:100%;height:100%;object-fit:contain">';
document.getElementById('prizeName').textContent = p.name;
document.getElementById('modal1').classList.add('show');
}

function showQRCode() {
document.getElementById('modal1').classList.remove('show');
setTimeout(function() {
document.getElementById('modal2').classList.add('show');
}, 300);
}

function closeAll() {
document.getElementById('modal2').classList.remove('show');
}

document.getElementById('modal1').addEventListener('click', function(e) {
if (e.target === this) closeAll();
});
document.getElementById('modal2').addEventListener('click', function(e) {
if (e.target === this) closeAll();
});

window.onload = init;
</script>
</body>
</html>
