<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>幸运大抽奖</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Microsoft YaHei',sans-serif}
.wrap{text-align:center;padding:20px}
h1{color:#ffd700;margin-bottom:30px;font-size:32px;text-shadow:0 0 20px rgba(255,215,0,0.5)}
.slot-machine{position:relative;width:340px;height:260px;background:linear-gradient(180deg,#2d2d44,#1a1a2e);border-radius:20px;padding:15px;margin:0 auto;box-shadow:0 15px 50px rgba(0,0,0,0.5),inset 0 2px 0 rgba(255,255,255,0.1);border:4px solid #ffd700}
.window{width:100%;height:170px;background:#000;border-radius:10px;overflow:hidden;display:flex;justify-content:center;align-items:center;box-shadow:inset 0 0 25px rgba(255,215,0,0.15)}
.reels{display:flex;gap:8px;justify-content:center}
.reel{width:90px;height:110px;position:relative;overflow:hidden;background:#111;border-radius:8px;border:2px solid #ffd700}
.reel-inner{position:absolute;width:100%;transition:top 0.1s ease-out}
.reel-item{width:100%;height:110px;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,#222,#111)}
.reel-item img{width:80px;height:80px;object-fit:contain}
.line{position:absolute;top:50%;left:5%;width:90%;height:3px;background:rgba(255,215,0,0.7);box-shadow:0 0 12px rgba(255,215,0,0.9);z-index:10;transform:translateY(-50%)}
.handle{position:absolute;right:-22px;top:50%;width:25px;height:100px;background:linear-gradient(90deg,#c0c0c0,#888);border-radius:0 12px 12px 0;transform:translateY(-50%);cursor:pointer;transition:transform 0.2s;z-index:5}
.handle::after{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:16px;height:16px;background:#ffd700;border-radius:50%;box-shadow:0 0 8px rgba(255,215,0,0.5)}
.handle.pull{transform:translateY(-25%)}
.btn{width:200px;padding:15px;margin:25px auto 0;background:linear-gradient(180deg,#ffd700,#ff8c00);border:none;border-radius:50px;font-size:20px;font-weight:bold;color:#1a1a2e;cursor:pointer;box-shadow:0 6px 20px rgba(255,140,0,0.4);transition:all 0.2s}
.btn:hover{transform:scale(1.05);box-shadow:0 8px 25px rgba(255,140,0,0.5)}
.btn:disabled{background:#555;color:#999;cursor:not-allowed;transform:none}
.tip{color:#ffd700;margin-top:15px;font-size:14px;opacity:0.8}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:100}
.modal.show{display:flex}
.content{background:#fff;padding:40px 30px;border-radius:25px;text-align:center;max-width:90%;width:420px;animation:slideUp 0.5s cubic-bezier(0.17,0.67,0.12,0.99)}
.content h2{color:#764ba2;margin-bottom:20px;font-size:26px}
.prize-img{width:220px;height:220px;margin:15px auto;border-radius:15px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.15)}
.prize-img img{width:100%;height:100%;object-fit:contain}
.prize-name{font-size:20px;font-weight:bold;color:#333;margin:15px 0}
.qr-box{width:220px;height:220px;margin:20px auto;background:#f5f5f5;border-radius:15px;padding:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.qr-box img{width:100%;height:100%;object-fit:contain;border-radius:8px}
.content p{color:#666;font-size:15px;margin:12px 0;line-height:1.5}
.tip-text{color:#ff4757;font-size:13px;margin-top:10px}
.close{background:linear-gradient(180deg,#764ba2,#667eea);color:#fff;border:none;padding:12px 40px;border-radius:25px;font-size:16px;cursor:pointer;margin-top:15px;transition:transform 0.2s}
.close:hover{transform:scale(1.05)}
.save-btn{display:inline-block;background:#2ed573;color:#fff;border:none;padding:10px 25px;border-radius:20px;font-size:14px;cursor:pointer;margin-top:10px;text-decoration:none}
.save-btn:hover{transform:scale(1.05)}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:400px){
.slot-machine{width:300px;height:230px}
.reel{width:75px;height:95px}
.reel-item{width:75px;height:95px}
.reel-item img{width:65px;height:65px}
.btn{width:160px;font-size:16px}
.content{padding:30px 20px}
}
</style>
</head>
<body>
<div class="wrap">
<h1>🎰 幸运大抽奖 🎰</h1>
<div class="slot-machine">
<div class="window">
<div class="line"></div>
<div class="reels">
<div class="reel" id="reel1"></div>
<div class="reel" id="reel2"></div>
<div class="reel" id="reel3"></div>
</div>
</div>
<div class="handle" id="handle" onclick="spin()"></div>
</div>
<button class="btn" id="btn" onclick="spin()">🎰 抽奖</button>
<div class="tip">每人限抽1次 · 100%中奖</div>
</div>

<div class="modal" id="modal">
<div class="content">
<h2>🎉 恭喜中奖 🎉</h2>
<div class="prize-img" id="prizeImg"></div>
<div class="prize-name" id="prizeName"></div>
<div class="qr-box">
<img src="https://740879648-png.github.io/Aubreylt/qrcode.jpg" alt="二维码">
</div>
<p>长按保存二维码，扫码添加老师领奖</p>
<p class="tip-text">请在24小时内添加，过期作废</p>
<button class="close" onclick="closeModal()">我知道了</button>
</div>
</div>

<script>
var prizes = [
{img:'AI工具包.jpg',name:'特等奖 - 免单',prob:0},
{img:'AI工具包.jpg',name:'一等奖 - AI工具包（价值2690元）',prob:1},
{img:'小米手机.jpg',name:'二等奖 - 小米手机（价值1199元）',prob:0},
{img:'蒸汽锅.jpg',name:'三等奖 - 蒸汽锅（价值398元）',prob:0},
{img:'AI工具包.jpg',name:'幸运奖 - 50元红包',prob:0},
{img:'AI工具包.jpg',name:'参与奖 - 20元红包',prob:0},
{img:'AI工具包.jpg',name:'参与奖 - 10元红包',prob:0},
{img:'AI工具包.jpg',name:'谢谢参与',prob:0}
];

var baseUrl = 'https://740879648-png.github.io/Aubreylt/';
var drawn = localStorage.getItem('lottery_drawn') === 'yes';
var spinning = false;
var rot = 0;

function init() {
var btn = document.getElementById('btn');
if (drawn) {
btn.disabled = true;
btn.textContent = '✓ 已抽奖';
document.querySelector('.tip').textContent = '您已参与过抽奖';
}
prizes.forEach(function(p, i) {
['reel1','reel2','reel3'].forEach(function(id) {
var item = document.createElement('div');
item.className = 'reel-item';
item.innerHTML = '<img src="' + baseUrl + p.img + '">';
document.getElementById(id).appendChild(item);
});
});
if (drawn) showResult(1);
}

function spin() {
if (spinning) return;
if (drawn) {alert('您已参与过抽奖！');return;}
spinning = true;
var btn = document.getElementById('btn');
var handle = document.getElementById('handle');
btn.disabled = true;
btn.textContent = '⏳ 抽奖中...';
handle.classList.add('pull');
setTimeout(function(){handle.classList.remove('pull')},300);

// find winning index
var rand = Math.random();
var cum = 0;
var idx = prizes.length - 1;
for (var i = 0; i < prizes.length; i++) {
cum += prizes[i].prob;
if (rand < cum) {idx = i; break;}
}

var ang = 360 / prizes.length;
var base = 360 * 8;
var prizeAng = ang * idx;
var target = rot + base + (360 - prizeAng - ang / 2);

// animate reels
['reel1','reel2','reel3'].forEach(function(id, k) {
var inner = document.getElementById(id).querySelector('.reel-inner') || document.getElementById(id);
inner.style.transition = 'none';
inner.style.top = '0px';
setTimeout(function() {
inner.style.transition = 'top ' + (3.5 + k * 0.3) + 's cubic-bezier(0.1,0.4,0.3,1)';
inner.style.top = -(110 * idx + 55) + 'px';
}, 50);
});

rot = target;
document.querySelector('.slot-machine').style.transform = 'rotate(' + target + 'deg)';

setTimeout(function() {
drawn = true;
localStorage.setItem('lottery_drawn', 'yes');
btn.textContent = '✓ 已抽奖';
document.querySelector('.tip').textContent = '您已参与过抽奖';
showResult(idx);
spinning = false;
}, 5000);
}

function showResult(idx) {
var p = prizes[idx];
document.getElementById('prizeImg').innerHTML = '<img src="' + baseUrl + p.img + '">';
document.getElementById('prizeName').textContent = p.name;
document.getElementById('modal').classList.add('show');
}

function closeModal() {
document.getElementById('modal').classList.remove('show');
}

document.getElementById('modal').addEventListener('click', function(e) {
if (e.target === this) closeModal();
});

window.onload = init;
</script>
</body>
</html>
